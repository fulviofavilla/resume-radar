<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeRadar</title>
  <style>
    @font-face {
      font-family: 'Space Mono';
      src: url('/static/fonts/space-mono-v17-latin/space-mono-v17-latin-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('/static/fonts/space-mono-v17-latin/space-mono-v17-latin-700.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('/static/fonts/dm-sans-v17-latin/dm-sans-v17-latin-300.woff2') format('woff2');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('/static/fonts/dm-sans-v17-latin/dm-sans-v17-latin-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('/static/fonts/dm-sans-v17-latin/dm-sans-v17-latin-500.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #4da6ff;
      --accent-dim: rgba(77, 166, 255, 0.12);
      --text: #f0f0f0;
      --muted: #666;
      --muted-light: #999;
      --danger: #ff4f4f;
      --score-weak: #ff4f4f;
      --score-fair: #ff8c42;
      --score-good: #4da6ff;
      --score-great: #3ddc84;
      --estimated: #6b8fa8;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── Layout ── */
    .shell {
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 24px 120px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 56px;
    }
    .header-spacer { flex: 1; }
    .github-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .github-link:hover { color: var(--accent); }
    .github-link svg { width: 16px; height: 16px; fill: currentColor; }
    .logo {
      font-family: var(--mono);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .logo-sub {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }

    /* ── Upload zone ── */
    #upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 4px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #upload-zone:hover, #upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    #upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }
    .upload-label {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .upload-label span { color: var(--accent); }
    #file-name {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--accent);
      font-family: var(--mono);
      min-height: 1.2em;
    }

    /* ── Form fields ── */
    .field {
      margin-top: 20px;
    }
    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field label .optional {
      color: var(--muted-light);
      letter-spacing: 0.06em;
      font-size: 0.68rem;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    /* ── Submit ── */
    #submit-btn {
      margin-top: 24px;
      width: 100%;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 3px;
      padding: 13px;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #submit-btn:hover { opacity: 0.88; }
    #submit-btn:active { transform: scale(0.99); }
    #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Download PDF button */
    #download-btn {
      display: none;
      margin-top: 20px;
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 3px;
      padding: 11px;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      text-align: center;
    }
    #download-btn:hover {
      background: var(--accent-dim);
    }

    /* ── Progress ── */
    #progress-section { display: none; margin-top: 48px; }

    .progress-header {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .pipeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pipeline-step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .pipeline-step:last-child { border-bottom: none; }
    .pipeline-step.active { opacity: 1; }
    .pipeline-step.done { opacity: 0.6; }

    .step-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: border-color 0.3s, background 0.3s;
      font-family: var(--mono);
      font-size: 0.65rem;
    }
    .pipeline-step.active .step-indicator {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .pipeline-step.done .step-indicator {
      border-color: var(--accent);
      background: var(--accent);
      color: #0a0a0a;
    }

    .step-body { flex: 1; }
    .step-name {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      margin-bottom: 2px;
    }
    .step-msg {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .pipeline-step.active .step-msg { color: var(--accent); }
    .pipeline-step.done .step-msg   { color: var(--muted-light); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Results ── */
    #results-section { display: none; margin-top: 56px; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Score card */
    .score-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 28px 28px 24px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .score-circle {
      position: relative;
      flex-shrink: 0;
    }
    .score-circle svg { transform: rotate(-90deg); }
    .score-circle .track { fill: none; stroke: var(--border); stroke-width: 4; }
    .score-circle .fill  { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .score-meta { flex: 1; }
    .score-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .score-summary { font-size: 0.88rem; color: var(--text); line-height: 1.55; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 2px;
      background: var(--border);
      color: var(--muted);
    }
    .tag.strength { background: var(--accent-dim); color: var(--accent); }
    .tag.missing  { background: rgba(255,79,79,0.1); color: var(--danger); }

    /* Lists */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .rec-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .rec-list li {
      display: flex;
      gap: 12px;
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--text);
    }
    .rec-list li::before {
      content: '→';
      color: var(--accent);
      font-family: var(--mono);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Rewrite cards */
    .rewrite-item {
      border: 1.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .rewrite-header {
      background: var(--surface);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rewrite-section-name {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .estimated-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 2px;
      background: rgba(107, 143, 168, 0.15);
      color: var(--estimated);
      letter-spacing: 0.04em;
    }

    /* Side-by-side rewrites on desktop, stacked on mobile */
    .rewrite-body {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 0 20px;
    }
    .rewrite-col { padding-bottom: 12px; }
    .rewrite-reason {
      grid-column: 1 / -1;
      font-size: 0.78rem;
      color: var(--muted);
      padding-top: 12px;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }
    @media (max-width: 560px) {
      .rewrite-body {
        grid-template-columns: 1fr;
      }
      .rewrite-reason { grid-column: 1; }
    }

    .rewrite-col label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .rewrite-col p {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text);
    }
    .rewrite-col.new p { color: var(--accent); }
    .alignment-note {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 4px;
    }

    /* Jobs */
    .job-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .job-item:last-child { border-bottom: none; }
    .job-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 3px;
    }
    .job-meta { font-size: 0.78rem; color: var(--muted); }
    .job-meta a {
      color: var(--accent);
      text-decoration: none;
      margin-left: 8px;
      font-family: var(--mono);
      font-size: 0.72rem;
    }
    .job-meta a:hover { text-decoration: underline; }

    /* Error */
    #error-msg {
      display: none;
      margin-top: 24px;
      padding: 14px 18px;
      background: rgba(255,79,79,0.08);
      border: 1.5px solid rgba(255,79,79,0.3);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--danger);
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 32px 0; }

    /* Fade-in for results sections */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.35s ease both;
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">📡 ResumeRadar</div>
    <div class="logo-sub">v0.6.0</div>
    <div class="header-spacer"></div>
    <a class="github-link" href="https://github.com/fulviofavilla/resume-radar" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
      </svg>
      GitHub
    </a>
  </header>

  <!-- Upload form -->
  <div id="upload-zone">
    <input type="file" id="file-input" accept=".pdf" />
    <span class="upload-icon">⬆</span>
    <div class="upload-label">Drop your resume PDF here, or <span>click to browse</span></div>
    <div id="file-name"></div>
  </div>

  <div class="field">
    <label for="target-role">Target role <span class="optional">(OPTIONAL)</span></label>
    <input type="text" id="target-role" placeholder="e.g. Data Engineer, ML Engineer, Backend Engineer" />
  </div>

  <button id="submit-btn" disabled>Analyze resume</button>
  <a id="download-btn" href="#" download>⬇ Download PDF report</a>

  <div id="error-msg"></div>

  <!-- Progress -->
  <div id="progress-section">
    <div class="progress-header">Pipeline</div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  <!-- Results -->
  <div id="results-section" id="results"></div>

</div>

<script>
const STEPS = [
  { id: 'parse_resume',    label: 'parse_resume',    desc: 'Waiting...', done: 'Skills extracted from resume.' },
  { id: 'search_jobs',     label: 'search_jobs',     desc: 'Waiting...', done: 'Job postings retrieved.' },
  { id: 'embed_match',     label: 'embed_match',     desc: 'Waiting...', done: 'Semantic match computed.' },
  { id: 'generate_report', label: 'generate_report', desc: 'Waiting...', done: 'Recommendations generated.' },
  { id: 'rewrite_resume',  label: 'rewrite_resume',  desc: 'Waiting...', done: 'Rewrite suggestions ready.' },
];

// ── DOM refs ──
const fileInput    = document.getElementById('file-input');
const uploadZone   = document.getElementById('upload-zone');
const fileNameEl   = document.getElementById('file-name');
const targetRole   = document.getElementById('target-role');
const submitBtn    = document.getElementById('submit-btn');
const errorMsg     = document.getElementById('error-msg');
const progressSec  = document.getElementById('progress-section');
const pipelineEl   = document.getElementById('pipeline');
const resultsSec   = document.getElementById('results-section');
const downloadBtn  = document.getElementById('download-btn');

// ── Upload zone ──
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') setFile(f);
});
fileInput.addEventListener('change', () => fileInput.files[0] && setFile(fileInput.files[0]));

function setFile(f) {
  fileInput._file = f;
  fileNameEl.textContent = f.name;
  submitBtn.disabled = false;
}

// ── Pipeline UI ──
function buildPipeline() {
  pipelineEl.innerHTML = '';
  STEPS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'pipeline-step';
    el.id = `step-${s.id}`;
    el.innerHTML = `
      <div class="step-indicator" id="ind-${s.id}">${i + 1}</div>
      <div class="step-body">
        <div class="step-name">${s.label}</div>
        <div class="step-msg" id="msg-${s.id}">${s.desc}</div>
      </div>`;
    pipelineEl.appendChild(el);
  });
}

function activateStep(stepId, message) {
  // Mark previous active as done with its completion message
  document.querySelectorAll('.pipeline-step.active').forEach(el => {
    const sid = el.id.replace('step-', '');
    const stepDef = STEPS.find(s => s.id === sid);
    el.classList.remove('active');
    el.classList.add('done');
    el.querySelector('.step-indicator').innerHTML = '✓';
    el.querySelector('.step-msg').textContent = stepDef ? stepDef.done : 'Done.';
  });
  const el = document.getElementById(`step-${stepId}`);
  if (!el) return;
  el.classList.add('active');
  document.getElementById(`msg-${stepId}`).innerHTML =
    `<span class="spinner"></span> ${message}`;
}

function completeAll() {
  document.querySelectorAll('.pipeline-step.active, .pipeline-step:not(.done)').forEach(el => {
    const sid = el.id.replace('step-', '');
    const stepDef = STEPS.find(s => s.id === sid);
    el.classList.remove('active');
    el.classList.add('done');
    el.querySelector('.step-indicator').innerHTML = '✓';
    el.querySelector('.step-msg').textContent = stepDef ? stepDef.done : 'Done.';
  });
}

// ── Submit ──
submitBtn.addEventListener('click', async () => {
  const file = fileInput._file;
  if (!file) return;

  // Reset UI
  showError('');
  resultsSec.style.display = 'none';
  resultsSec.innerHTML = '';
  downloadBtn.style.display = 'none';
  downloadBtn.href = '#';
  buildPipeline();
  progressSec.style.display = 'block';
  submitBtn.disabled = true;

  // POST /analyze
  const form = new FormData();
  form.append('file', file);
  if (targetRole.value.trim()) form.append('target_role', targetRole.value.trim());

  let jobId;
  try {
    const res = await fetch('/analyze', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Upload failed');
    }
    const data = await res.json();
    jobId = data.job_id;
  } catch (e) {
    showError(e.message);
    submitBtn.disabled = false;
    return;
  }

  // SSE progress stream
  const es = new EventSource(`/progress/${jobId}`);
  es.onmessage = (e) => {
    const event = JSON.parse(e.data);
    if (event.step === 'done') {
      es.close();
      completeAll();
      fetchAndRenderResults(jobId);
    } else if (event.step === 'error') {
      es.close();
      showError(event.message);
      submitBtn.disabled = false;
    } else {
      activateStep(event.step, event.message);
    }
  };
  es.onerror = () => {
    es.close();
    pollResults(jobId);
  };
});

// ── Polling fallback ──
async function pollResults(jobId) {
  for (let i = 0; i < 60; i++) {
    await sleep(3000);
    const res = await fetch(`/results/${jobId}`);
    const data = await res.json();
    if (data.status === 'completed') { renderResults(data); return; }
    if (data.status === 'failed')    { showError(data.error || 'Analysis failed'); submitBtn.disabled = false; return; }
  }
  showError('Timed out waiting for results.');
  submitBtn.disabled = false;
}

async function fetchAndRenderResults(jobId) {
  const res = await fetch(`/results/${jobId}`);
  const data = await res.json();
  if (data.status === 'completed') renderResults(data);
  else showError(data.error || 'Analysis failed');
  submitBtn.disabled = false;
}

// ── Render results ──
function renderResults(data) {
  const report  = data.report;
  const profile = data.resume_profile;
  const gaps    = report.gap_analysis;

  resultsSec.style.display = 'block';
  resultsSec.innerHTML = '';

  // Show PDF download button
  downloadBtn.href = `/results/${data.job_id}/pdf`;
  downloadBtn.style.display = 'block';

  // Score card
  const scoreInt = Math.round(gaps.match_score * 100);
  const circ = 2 * Math.PI * 30; // r=30
  const offset = circ - (scoreInt / 100) * circ;
  const scoreColor = scoreInt >= 85 ? 'var(--score-great)'
                   : scoreInt >= 70 ? 'var(--score-good)'
                   : scoreInt >= 50 ? 'var(--score-fair)'
                   : 'var(--score-weak)';
  insertFade(resultsSec, `
    <div class="section-label">Match analysis</div>
    <div class="score-card">
      <div class="score-circle">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="track" cx="36" cy="36" r="30"/>
          <circle class="fill" cx="36" cy="36" r="30"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${circ}"
            style="stroke: ${scoreColor}"
            id="score-arc"/>
        </svg>
        <div class="score-number" style="color: ${scoreColor}">${scoreInt}%</div>
      </div>
      <div class="score-meta">
        <div class="score-title">Semantic match score</div>
        <div class="score-summary">${profile.summary}</div>
        <div class="tags">
          ${gaps.strengths.slice(0, 8).map(s => `<span class="tag strength">${s}</span>`).join('')}
          ${gaps.missing_skills.slice(0, 5).map(s => `<span class="tag missing">− ${s}</span>`).join('')}
        </div>
      </div>
    </div>`);

  // Animate score arc after render
  requestAnimationFrame(() => {
    const arc = document.getElementById('score-arc');
    if (arc) arc.style.strokeDashoffset = offset;
  });

  // Recommendations
  insertFade(resultsSec, `
    <div class="card">
      <div class="card-title">Recommendations</div>
      <ul class="rec-list">
        ${report.recommendations.map(r => `<li>${r}</li>`).join('')}
      </ul>
    </div>`);

  // Rewrite suggestions
  if (report.resume_rewrites && report.resume_rewrites.length > 0) {
    insertFade(resultsSec, `<div class="section-label" style="margin-top:32px">Resume rewrites</div>`);
    report.resume_rewrites.forEach(rw => {
      insertFade(resultsSec, `
        <div class="rewrite-item">
          <div class="rewrite-header">
            <span class="rewrite-section-name">${rw.section}</span>
            ${rw.quantification_is_estimated ? '<span class="estimated-badge">numbers estimated</span>' : ''}
          </div>
          <div class="rewrite-body">
            <div class="rewrite-col">
              <label>Original</label>
              <p>${rw.original}</p>
            </div>
            <div class="rewrite-col new">
              <label>Suggested rewrite</label>
              <p>${rw.rewrite}</p>
            </div>
            <div class="rewrite-reason">
              ${rw.reason}
              ${rw.alignment_note ? `<div class="alignment-note">${rw.alignment_note}</div>` : ''}
            </div>
          </div>
        </div>`);
    });
  }

  // Top jobs
  insertFade(resultsSec, `
    <div class="divider"></div>
    <div class="section-label">Jobs analyzed (${report.jobs_analyzed})</div>
    <div class="card">
      ${report.top_jobs.map(j => `
        <div class="job-item">
          <div class="job-title">${j.title}</div>
          <div class="job-meta">${j.company} · ${j.source}
            <a href="${j.url}" target="_blank" rel="noopener">view ↗</a>
          </div>
        </div>`).join('')}
    </div>`);
}

// ── Helpers ──
function insertFade(container, html) {
  const wrapper = document.createElement('div');
  wrapper.className = 'fade-in';
  wrapper.innerHTML = html;
  container.appendChild(wrapper);
}

function showError(msg) {
  errorMsg.style.display = msg ? 'block' : 'none';
  errorMsg.textContent = msg ? `⚠ ${msg}` : '';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
